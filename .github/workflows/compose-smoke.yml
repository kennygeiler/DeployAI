# Story 1.7 — docker-compose reference dev environment smoke gate.
#
# Brings up the complete local stack (postgres + pgvector/pgcrypto, redis,
# minio, freetsa-stub, control-plane, web) on a clean ubuntu-24.04 runner,
# seeds the fixtures schema, and probes every service's health endpoint.
# Fails if wall-clock exceeds 30 min (NFR77 onboarding budget).
#
# PRs: the workflow always dispatches. A cheap `paths-filter` in `prep` decides
# whether the heavy `compose-smoke` job runs; if not, that job is skipped and
# GitHub counts it as a successful required check (unlike top-level
# `on.pull_request.paths`, which left checks stuck on "expected").
# Pushes to `main` always run the heavy job when this workflow runs.
#
# See .github/workflows/README.md §Conventions. See docs/dev-environment.md
# for local `make dev` reproduction.

name: compose-smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  prep:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.resolve.outputs.run }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Path filter (pull request)
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            run:
              - "infra/**"
              - "services/**"
              - "apps/web/Dockerfile"
              - "apps/web/next.config.*"
              - "apps/web/package.json"
              - "packages/authz/**"
              - "packages/design-tokens/**"
              - "Makefile"
              - ".github/workflows/compose-smoke.yml"
              - "pnpm-lock.yaml"

      - name: Set run output (push = always, PR = path filter)
        id: resolve
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=${{ steps.filter.outputs.run }}" >> "${GITHUB_OUTPUT}"
          fi

  compose-smoke:
    name: compose-smoke
    needs: prep
    if: needs.prep.outputs.run == 'true'
    runs-on: ubuntu-24.04
    # 30-min stack ceiling per AC10 + 5-min buffer for runner setup.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Show Docker + Compose versions
        run: |
          docker --version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Bring up stack + seed (make dev)
        env:
          DOCKER_BUILDKIT: 1
        run: |
          make dev

      - name: Verify services (make dev-verify)
        run: |
          make dev-verify

      - name: Report compose state
        if: always()
        run: |
          docker compose --env-file infra/compose/.env -f infra/compose/docker-compose.yml ps || true

      - name: Collect compose logs on failure
        if: failure()
        run: |
          mkdir -p compose-logs
          docker compose --env-file infra/compose/.env -f infra/compose/docker-compose.yml logs --no-color --timestamps > compose-logs/compose.log || true
          docker compose --env-file infra/compose/.env -f infra/compose/docker-compose.yml ps > compose-logs/ps.txt || true

      - name: Upload compose logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: compose-logs
          path: compose-logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: |
          make dev-down || true
