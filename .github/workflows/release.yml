# Release — supply-chain ceremony on tag push (AC2, AC3, AC11)
#
# What this workflow does on every tag push (and on workflow_dispatch
# from the canonical repo):
#   - Runs the full smoke suite on the tag commit (authoritative gate).
#   - Packages each buildable workspace's output into one tarball under
#     dist/ — one archive per workspace, named
#     `<workspace>-<tag>.tar.gz`. Workspaces with no buildable output
#     (library-only Python helpers whose `uv sync` produced nothing
#     novel) emit a ::notice:: and are skipped silently.
#   - Installs cosign v3.0.6 via sigstore/cosign-installer.
#   - Keyless-signs every tarball using GitHub OIDC + Sigstore (NFR63).
#     cosign v3 emits a single `.sigstore.json` bundle per artifact
#     (cert + signature + rekor entry together) — the old separate
#     `.sig` + `.pem` files are gone.
#   - Produces a SLSA v1.0 build-provenance attestation for each tarball
#     via actions/attest-build-provenance (NFR64 — SLSA Level 2 V1;
#     we upgrade to L3 post-StateRAMP per the architecture doc).
#   - Creates the GitHub Release for the tag (idempotent) and uploads
#     tarballs + `.sigstore.json` bundles + SBOM artifacts to it.
#   - Builds + pushes versioned + `:latest` OCI images for
#     `services/control-plane` and `apps/web` to ghcr.io, with
#     build-provenance attestations attached to each image digest.
#
# Fork-PR safety (AC11): this workflow is tag-triggered (only
# collaborators with push/tag permission can invoke it) and its
# workflow_dispatch path is gated to the canonical repo, so forks
# cannot exfiltrate signing identities via a malicious PR.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # guard-artifacts — runtime detection of Story 1.3+ state.
  # Emits has_artifacts=true once any apps/<x>/package.json or
  # services/<x>/{package.json,pyproject.toml,go.mod,Cargo.toml}
  # exists. Until then, every downstream job is skipped with a
  # ::notice:: explaining why.
  # ------------------------------------------------------------------
  guard-artifacts:
    name: Guard — check for buildable artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      has_artifacts: ${{ steps.detect.outputs.has_artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Detect buildable workspaces
        id: detect
        run: |
          count=0
          for pattern in \
              'apps/*/package.json' \
              'services/*/package.json' \
              'services/*/pyproject.toml' \
              'services/*/go.mod' \
              'apps/*/src-tauri/Cargo.toml'
          do
            found=$(ls $pattern 2>/dev/null | wc -l | tr -d ' ')
            count=$((count + found))
          done
          if [ "$count" -gt 0 ]; then
            echo "Detected $count buildable workspace manifest(s)."
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Release is a no-op::No buildable workspaces detected yet — release ceremony will activate automatically once Story 1.3 lands apps/* and services/* starters."
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------------------------------------
  # validate — smoke suite as the authoritative release gate.
  # Even on the tag path we re-run the gate; cached turbo makes this
  # fast when the tag commit matches a previously-green main commit.
  # ------------------------------------------------------------------
  validate:
    name: Validate — smoke suite on tag
    needs: [guard-artifacts]
    if: needs.guard-artifacts.outputs.has_artifacts == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test
      - run: pnpm turbo run contract:check
      - run: pnpm turbo run validate:llm-matrix
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck

  # ------------------------------------------------------------------
  # build-and-sign — package + cosign + SLSA provenance.
  # Only runs after validate + guard-artifacts say go.
  # Requires id-token:write (OIDC for keyless signing) and
  # attestations:write (to publish the SLSA predicate).
  # See Dev Notes §"SLSA provenance: the 2026 stack" in the story
  # file for why actions/attest-build-provenance@v4 is chosen over
  # direct slsa-github-generator usage.
  # ------------------------------------------------------------------
  build-and-sign:
    name: Build, sign, attest provenance
    needs: [validate, guard-artifacts]
    if: needs.guard-artifacts.outputs.has_artifacts == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write # To attach assets to the Release
      id-token: write # OIDC for cosign keyless + attestations
      attestations: write # Publish SLSA provenance to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build

      - name: Package artifacts
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          tag="${REF_NAME}"

          pack() {
            # pack <archive-name-stem> <source-dir> [<extra-source>...]
            # Tars the source dir(s) into dist/<stem>-<tag>.tar.gz.
            # If a single source dir is given and it doesn't exist or is
            # empty, emits a ::notice:: and skips.
            local stem="$1"; shift
            local out="dist/${stem}-${tag}.tar.gz"

            if [ "$#" -eq 1 ]; then
              local src="$1"
              if [ ! -d "$src" ] || [ -z "$(ls -A "$src" 2>/dev/null)" ]; then
                echo "::notice title=Skipped::${stem}: ${src} missing or empty (no build output)."
                return 0
              fi
              tar -czf "$out" -C "$src" .
              echo "Packed $out ($(du -h "$out" | cut -f1))"
              return 0
            fi

            # Multi-source form: stage selected paths into a tempdir,
            # preserving the input paths, then tar the tempdir contents.
            local staging
            staging="$(mktemp -d)"
            local copied=0
            for src in "$@"; do
              if [ -e "$src" ]; then
                mkdir -p "$staging/$(dirname "$src")"
                cp -R "$src" "$staging/$src"
                copied=$((copied + 1))
              fi
            done
            if [ "$copied" -eq 0 ]; then
              echo "::notice title=Skipped::${stem}: no source paths present."
              rm -rf "$staging"
              return 0
            fi
            tar -czf "$out" -C "$staging" .
            rm -rf "$staging"
            echo "Packed $out ($(du -h "$out" | cut -f1))"
          }

          # apps/web — Next.js standalone bundle (next.config.ts sets
          # output: "standalone"). Public + static assets live outside
          # standalone/ and must ship alongside it.
          if [ -d apps/web/.next/standalone ]; then
            staging="$(mktemp -d)"
            cp -R apps/web/.next/standalone/. "$staging/"
            mkdir -p "$staging/apps/web/.next"
            [ -d apps/web/.next/static ] && cp -R apps/web/.next/static "$staging/apps/web/.next/static"
            [ -d apps/web/public ] && cp -R apps/web/public "$staging/apps/web/public"
            tar -czf "dist/apps-web-${tag}.tar.gz" -C "$staging" .
            rm -rf "$staging"
            echo "Packed dist/apps-web-${tag}.tar.gz"
          else
            echo "::notice title=Skipped::apps-web: .next/standalone missing."
          fi

          # services/control-plane — full workspace (src + alembic +
          # migrations + .venv + pyproject + uv.lock) so receivers can
          # either `uv sync` against the lockfile or use the prebuilt
          # .venv directly.
          pack services-control-plane \
            services/control-plane/src \
            services/control-plane/alembic \
            services/control-plane/migrations \
            services/control-plane/pyproject.toml \
            services/control-plane/uv.lock \
            services/control-plane/.venv \
            services/control-plane/alembic.ini \
            services/control-plane/README.md

          # services/ingest — Python service.
          pack services-ingest \
            services/ingest/src \
            services/ingest/migrations \
            services/ingest/pyproject.toml \
            services/ingest/uv.lock \
            services/ingest/.venv \
            services/ingest/README.md

          # services/cartographer — Python service.
          pack services-cartographer \
            services/cartographer/src \
            services/cartographer/pyproject.toml \
            services/cartographer/uv.lock \
            services/cartographer/.venv

          # services/_shared/* — library workspaces. `pnpm turbo build`
          # runs `uv sync --frozen` on each, so .venv may or may not be
          # populated depending on dependency graph; pack helper skips
          # silently when no sources exist.
          for shared in authz checkpointer citation runtime tenancy tsa; do
            pack "services-_shared-${shared}" \
              "services/_shared/${shared}/src" \
              "services/_shared/${shared}/pyproject.toml" \
              "services/_shared/${shared}/uv.lock" \
              "services/_shared/${shared}/.venv" \
              "services/_shared/${shared}/README.md"
          done

          # packages/contracts — TS package, build output under dist/.
          pack packages-contracts \
            packages/contracts/dist \
            packages/contracts/schema \
            packages/contracts/package.json \
            packages/contracts/README.md

          # packages/llm-provider-py — Python package.
          pack packages-llm-provider-py \
            packages/llm-provider-py/src \
            packages/llm-provider-py/scripts \
            packages/llm-provider-py/pyproject.toml \
            packages/llm-provider-py/uv.lock

          echo "--- dist/ contents ---"
          ls -la dist/

      - name: Generate SBOMs (SPDX + CycloneDX) for release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.7
        with:
          path: "."
          format: spdx-json
          artifact-name: release-sbom-spdx.json
          output-file: dist/release-sbom-spdx.json
          upload-release-assets: true

      - name: Generate CycloneDX SBOM for release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.7
        with:
          path: "."
          format: cyclonedx-json
          artifact-name: release-sbom-cyclonedx.json
          output-file: dist/release-sbom-cyclonedx.json
          upload-release-assets: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v3.0.6"

      - name: Verify cosign installation
        run: cosign version

      - name: Sign release artifacts (keyless)
        # cosign v3 defaults to the new bundle format and rejects
        # --output-signature/--output-certificate. One Sigstore bundle per
        # artifact carries cert + signature + rekor entry together.
        run: |
          shopt -s nullglob
          for f in dist/*.tar.gz dist/*.json; do
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done

      - name: Generate SLSA v1.0 build-provenance attestation
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4.0.0
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; will upload missing assets."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "DeployAI ${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md \
              --verify-tag
          fi

      - name: Upload signed artifacts to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.sigstore.json dist/release-sbom-*.json)
          # Defensive: the Package artifacts step above produces at least
          # one tarball per buildable workspace, and Generate SBOMs
          # produces two .json files. An empty assets array here means
          # packaging regressed — fail loud rather than publish an
          # empty Release.
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No assets to upload — packaging step produced nothing. This indicates a regression in the Package artifacts step." >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber

  # ------------------------------------------------------------------
  # images — build + push versioned OCI images to ghcr.io on tag.
  # Matrix over the two shipped Dockerfiles (control-plane, web).
  # Build context is repo root because both Dockerfiles copy sibling
  # workspace paths (services/_shared, packages/*, pnpm workspace
  # graph). Tag-triggered only — workflow_dispatch must not publish.
  # ------------------------------------------------------------------
  images:
    name: Build + push OCI image (${{ matrix.image }})
    needs: [build-and-sign, guard-artifacts]
    if: |
      needs.guard-artifacts.outputs.has_artifacts == 'true'
      && github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write # push to ghcr.io
      id-token: write # OIDC for build-provenance attestation
      attestations: write # publish image provenance to repo
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: control-plane
            dockerfile: services/control-plane/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Verify Dockerfile exists
        id: dockerfile
        run: |
          if [ ! -f "${{ matrix.dockerfile }}" ]; then
            echo "::warning::${{ matrix.dockerfile }} not found — skipping ${{ matrix.image }} image build."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        if: steps.dockerfile.outputs.present == 'true'
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/kennygeiler/deployai/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/kennygeiler/deployai/${{ matrix.image }}:latest
          provenance: true
          sbom: false

      - name: Echo image digest
        if: steps.dockerfile.outputs.present == 'true'
        run: |
          echo "Pushed ghcr.io/kennygeiler/deployai/${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      - name: Generate build-provenance attestation for image
        if: steps.dockerfile.outputs.present == 'true'
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4.0.0
        with:
          subject-name: ghcr.io/kennygeiler/deployai/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
