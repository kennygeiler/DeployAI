# Release — supply-chain ceremony on tag push (AC2, AC3, AC11)
#
# This workflow ships in Story 1.2 but is DORMANT until Story 1.3 lands
# buildable workspaces under apps/* and services/*. The `guard-artifacts`
# job detects at runtime whether there's anything to sign and auto-activates
# the ceremony as soon as real artifacts exist — no code change required.
#
# What this workflow does when activated:
#   - Runs the full smoke suite on the tag commit (authoritative gate).
#   - Packages each workspace's build output into tarballs under dist/.
#   - Installs cosign v3.0.6 via sigstore/cosign-installer.
#   - Keyless-signs every tarball using GitHub OIDC + Sigstore (NFR63).
#   - Produces a SLSA v1.0 build-provenance attestation for each tarball
#     via actions/attest-build-provenance (NFR64 — SLSA Level 2 V1;
#     we upgrade to L3 post-StateRAMP per the architecture doc).
#   - Uploads tarballs + .sig + .pem + SBOM artifacts to the GitHub
#     Release created by the tag.
#
# Fork-PR safety (AC11): this workflow is tag-triggered (only
# collaborators with push/tag permission can invoke it) and its
# workflow_dispatch path is gated to the canonical repo, so forks
# cannot exfiltrate signing identities via a malicious PR.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # guard-artifacts — runtime detection of Story 1.3+ state.
  # Emits has_artifacts=true once any apps/<x>/package.json or
  # services/<x>/{package.json,pyproject.toml,go.mod,Cargo.toml}
  # exists. Until then, every downstream job is skipped with a
  # ::notice:: explaining why.
  # ------------------------------------------------------------------
  guard-artifacts:
    name: Guard — check for buildable artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      has_artifacts: ${{ steps.detect.outputs.has_artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Detect buildable workspaces
        id: detect
        run: |
          count=0
          for pattern in \
              'apps/*/package.json' \
              'services/*/package.json' \
              'services/*/pyproject.toml' \
              'services/*/go.mod' \
              'apps/*/src-tauri/Cargo.toml'
          do
            found=$(ls $pattern 2>/dev/null | wc -l | tr -d ' ')
            count=$((count + found))
          done
          if [ "$count" -gt 0 ]; then
            echo "Detected $count buildable workspace manifest(s)."
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Release is a no-op::No buildable workspaces detected yet — release ceremony will activate automatically once Story 1.3 lands apps/* and services/* starters."
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------------------------------------
  # validate — smoke suite as the authoritative release gate.
  # Even on the tag path we re-run the gate; cached turbo makes this
  # fast when the tag commit matches a previously-green main commit.
  # ------------------------------------------------------------------
  validate:
    name: Validate — smoke suite on tag
    needs: [guard-artifacts]
    if: needs.guard-artifacts.outputs.has_artifacts == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck

  # ------------------------------------------------------------------
  # build-and-sign — package + cosign + SLSA provenance.
  # Only runs after validate + guard-artifacts say go.
  # Requires id-token:write (OIDC for keyless signing) and
  # attestations:write (to publish the SLSA predicate).
  # See Dev Notes §"SLSA provenance: the 2026 stack" in the story
  # file for why actions/attest-build-provenance@v4 is chosen over
  # direct slsa-github-generator usage.
  # ------------------------------------------------------------------
  build-and-sign:
    name: Build, sign, attest provenance
    needs: [validate, guard-artifacts]
    if: needs.guard-artifacts.outputs.has_artifacts == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write # To attach assets to the Release
      id-token: write # OIDC for cosign keyless + attestations
      attestations: write # Publish SLSA provenance to the repo
      packages: write # (Future) push OCI images signed in-place
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build

      - name: Package artifacts
        run: |
          mkdir -p dist
          # TODO(story-1.3): per-workspace tarball + OCI image packaging.
          # Until Story 1.3 lands, this step is effectively a no-op
          # because guard-artifacts gates us to false. When Story 1.3
          # lands, extend this step with:
          #   tar -czf dist/<workspace>-<version>.tar.gz -C <out-dir> .
          #   docker build ... && docker push ...
          echo "::notice::Packaging is stubbed — Story 1.3 fills this in."

      - name: Generate SBOMs (SPDX + CycloneDX) for release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.7
        with:
          path: "."
          format: spdx-json
          artifact-name: release-sbom-spdx.json
          output-file: dist/release-sbom-spdx.json
          upload-release-assets: true

      - name: Generate CycloneDX SBOM for release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.7
        with:
          path: "."
          format: cyclonedx-json
          artifact-name: release-sbom-cyclonedx.json
          output-file: dist/release-sbom-cyclonedx.json
          upload-release-assets: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v3.0.6"

      - name: Verify cosign installation
        run: cosign version

      - name: Sign release artifacts (keyless)
        run: |
          shopt -s nullglob
          for f in dist/*.tar.gz dist/*.json; do
            echo "Signing $f"
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" "$f"
          done

      - name: Generate SLSA v1.0 build-provenance attestation
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4.0.0
        with:
          subject-path: "dist/*"
