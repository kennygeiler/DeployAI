# Storybook static build + optional Chromatic (Epic 7, UX-DR43). Fork-safe: no secrets on fork PRs
# without explicit tokens. `CHROMATIC_PROJECT_TOKEN` enables visual baselines in Chromatic.
#
# Build artifact is always uploaded for design review. Chromatic is skipped if the token is unset.

name: Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: build-storybook + optional Chromatic
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm turbo run build-storybook --filter=@deployai/web

      - name: Upload static Storybook
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 14

      - name: Chromatic
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        working-directory: apps/web
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: pnpm exec chromatic --ci --project-token "$CHROMATIC_PROJECT_TOKEN" --storybook-build-dir=storybook-static --exit-zero-on-changes
