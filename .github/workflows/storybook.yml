# Storybook static build + optional Chromatic (Epic 7, UX-DR43 / Stories 7-13–7-14).
# Fork-safe: Chromatic and PR comments skip when secrets / permissions are unavailable.
#
# - `CHROMATIC_PROJECT_TOKEN` enables Chromatic. **Strict** (no `--exit-zero-on-changes`) on
#   `push` to `main` so post-merge regressions fail CI. **PRs** use `--exit-zero-on-changes` so
#   pending Chromatic reviews do not block merge while diffs are triaged in Chromatic’s UI.
# - Same-repo PRs get a sticky comment with the Actions artifact link for `storybook-static`.

name: Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: build-storybook + optional Chromatic
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5.0.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build @deployai/shared-ui (fresh dist)
        run: pnpm turbo run build --filter=@deployai/shared-ui

      - name: Build Storybook
        run: pnpm turbo run build-storybook --filter=@deployai/web

      - name: Upload static Storybook
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 14

      - name: Chromatic
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        working-directory: apps/web
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm exec chromatic --ci \
              --project-token "$CHROMATIC_PROJECT_TOKEN" \
              --storybook-build-dir=storybook-static
          else
            pnpm exec chromatic --ci \
              --project-token "$CHROMATIC_PROJECT_TOKEN" \
              --storybook-build-dir=storybook-static \
              --exit-zero-on-changes
          fi

  storybook-pr-comment:
    name: PR comment (artifact link)
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Upsert Storybook comment
        uses: actions/github-script@62c3794a3eb6788d9a4aae18d420744cc0accc3b # v7.1.0
        with:
          script: |
            const marker = "<!-- deployai-storybook-bot -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body =
              `${marker}\n` +
              `## Storybook (this PR)\n\n` +
              `- **Download \`storybook-static\`:** open the [workflow run](${runUrl}) and download the **storybook-static** artifact.\n` +
              `- **Chromatic:** when the Chromatic check is present, use it for the hosted build and visual review.\n`;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
