# DeployAI — delivery status (honest tracker)
# =============================================================================
# Canonical product/architecture reference:
#   docs/product/deployai-source-of-truth-spec.md
# This file is the tracking counterpart to that document. Update BOTH in the
# same PR that changes delivery status.
#
# This REPLACES the BMAD-generated sprint-status.yaml. The BMAD version marked
# 13 of 16 epics "done" with ~95 stories "done"; in BMAD, "done" means "story
# acceptance criteria met / CI green" — NOT "production feature". The statuses
# below were re-derived by reading the code at commit c21e9b4 on 2026-05-21.
#
# STATUS LEGEND
#   solid          Genuinely complete, code-verified, production-shaped.
#   built-fixture  UI/code complete and functional, but runs on fixture /
#                  mock-seed / operator-supplied data — not real tenant data.
#   partial        Mixed: some stories real, others stubbed or not implemented.
#   stub           Structural code exists; core behavior is a placeholder.
#   backlog        Not started.
# =============================================================================

project: DeployAI
last_verified: 2026-05-21
verified_against: c21e9b4 (main)
canonical_doc: docs/product/deployai-source-of-truth-spec.md

headline: >-
  Demo-grade prototype. Strong engineering scaffolding; demo-shaped product.
  No live agent loop, no portfolio / multi-engagement data model, meeting
  presence is a stub. See deployai-source-of-truth-spec.md sections 3 and 14.

epics:

  epic-1:
    title: Foundations, Canonical Memory & Citation Envelope
    bmad_claim: done
    status: solid
    reality: >-
      Real structural work. Monorepo scaffold, 13 CI workflows, SBOM/CVE
      scanning, accessibility gates, design tokens, canonical-memory schema,
      three-layer tenant isolation + Postgres RLS, cross-tenant fuzz tests,
      citation envelope contract, RFC 3161 timestamp scaffolding.

  epic-2:
    title: Identity, Tenancy & SSO
    bmad_claim: done
    status: partial
    reality: >-
      OIDC and SCIM routes implemented; role matrix and tenant-scoped sessions
      real. SAML is explicitly NOT implemented (auth_saml.py returns 501-style
      "not implemented"). Integration kill-switch and break-glass are TODO stubs.

  epic-3:
    title: Ingestion Pipelines
    bmad_claim: done
    status: partial
    reality: >-
      M365 calendar/email/Teams and Slack/Gmail OAuth integration plumbing is
      real. ASR transcription of uploaded audio is a stub (logs + canned text).
      S3-backed body/artifact storage not implemented (disk stub only).

  epic-4:
    title: Agent Runtime Contracts & Replay-Parity Harness
    bmad_claim: done
    status: solid
    reality: >-
      Contracts and the rule + LLM-judge evaluation harness (apps/eval,
      tests/continuity-of-reference) are real and runnable. They validate
      contracts; they are not wired to a production agent.

  epic-5:
    title: Agent Runtime Foundation
    bmad_claim: done
    status: partial
    reality: >-
      Anthropic and OpenAI LLM provider clients are real (HTTP + SSE streaming,
      failover). The 7-phase state machine (machine.py, ~26 lines) and
      solidification classifier are thin deterministic code.

  epic-6:
    title: Cartographer, Oracle & Master Strategist
    bmad_claim: done
    status: stub
    reality: >-
      The "agents" are deterministic Python heuristics, not LLM-driven agents.
      Master Strategist arbitration is a weighted linear formula. No LangGraph
      state machines. No live loop ingests meetings and updates the UI.

  epic-7:
    title: Design System Component Library
    bmad_claim: done
    status: solid
    reality: >-
      Real. shared-ui primitives (citation chip, evidence panel, alert card,
      validation card, banners, etc.) — reusable, tested, Storybook-covered.

  epic-8:
    title: Morning Digest, Phase Tracking & Evening Synthesis
    bmad_claim: done
    status: built-fixture
    reality: >-
      Surfaces and nav chrome (digest, phase tracking, evening, Cmd+K) are real
      in the browser. Data is fixtures or optional HTTP feeds. BMAD epics.md
      itself notes the full Story 8.x acceptance criteria are not all satisfied.

  epic-9:
    title: In-Meeting Alert, Action Queue & Validation Queues
    bmad_claim: done
    status: built-fixture
    reality: >-
      Queue lifecycle APIs are real and Postgres-backed via CP. Validation/
      solidification rows are hardcoded mock seed data. Meeting detection is a
      stub; the in-meeting surface relies on stub tenants or a URL demo flag.

  epic-10:
    title: Override, Trust Repair & Personal Audit
    bmad_claim: done
    status: built-fixture
    reality: >-
      Overrides and personal-audit surfaces are real via BFF -> CP durable APIs.
      Credibility is bounded by identity: dev-header role injection, not real
      tenant SSO. Private-scope annotation crypto present.

  epic-11:
    title: Edge Capture Agent (Tauri macOS V1)
    bmad_claim: done
    status: partial
    reality: >-
      Tauri capability scaffold, Ed25519 device signing, tamper-evident
      transcripts, Sparkle verify path, CP kill-switch poll are real. Continuous
      CoreAudio audio capture is a follow-up (per capabilities doc).

  epic-12:
    title: FOIA Export, Compliance, Operability & External Auditor
    bmad_claim: in-progress
    status: partial
    reality: >-
      Go FOIA CLI / offline verifier exists (12-1). Bundle construction (12-2)
      in review. External auditor shell, break-glass end-to-end, immutable
      S3 audit log, compliance packet, SLOs/dashboards/paging, feature flags,
      chaos drills, cost telemetry (12-3..12-14) are all backlog.

  epic-13:
    title: Usability Validation & VPAT Authoring
    bmad_claim: backlog
    status: backlog
    reality: Not started.

  epic-14:
    title: V1.5 Scaffolding & Successor Inheritance
    bmad_claim: backlog
    status: backlog
    reality: >-
      Not started. Includes the Timeline surface and customer-admin
      self-service — both relevant to engagement tracking, both unbuilt.

  epic-15:
    title: Customer Pilot Prerequisites — Identity, Durability & Runbooks
    bmad_claim: done
    status: partial
    reality: >-
      Hosted session/tenant/role plumbing exists; queue durability decided
      (CP-only, no web memory fallback); pilot runbooks written. Meeting
      presence remains a stub; observability is doc-level, not instrumented.

  epic-16:
    title: Design Partner Pilot — Onboarding, Integrations UX & CP Loaders
    bmad_claim: done
    status: built-fixture
    reality: >-
      Onboarding shell and M365 integrations UX exist. CP "loaders" read
      operator-supplied JSON pilot-surface files, not automatic canonical-memory
      projections (those are types-only, unwired).

