# Golden questions for Agent Kenny v2 evaluation (scope-v2 §11.1, Phase 6 Wave A).
#
# 30 hand-curated questions, fixed distribution:
#   - 8 direct_lookup       — facts pulled from one BlueState-XL field
#   - 8 causal_chain        — trace a decision/risk back through 2+ ledger events
#   - 6 negative            — answer is NOT in the data; Kenny must IDK / refuse
#   - 4 cross_engagement    — ask Kenny in BlueState-XL about a different engagement
#   - 4 multi_hop           — risk -> decision -> meeting style traversal
#
# Each entry shape (consumed by runner.Question):
#   id: q-NNN
#   category: <one of the five>
#   question: "..."                        # text sent to Kenny
#   expected_answer_contains: [str, ...]   # substring match (case-insensitive)
#   expected_min_citations: int            # lower bound on citations.total
#   expected_kinds: [str, ...]             # citation kinds expected in reply
#   should_idk: bool                       # must contain an IDK / refusal marker

