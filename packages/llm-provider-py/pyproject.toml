[project]
name = "llm-provider-py"
version = "0.0.0"
description = "Python LLMProvider mirror of @deployai/llm-provider (Story 1-14)"
requires-python = ">=3.13,<3.14"
dependencies = [
  "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_provider"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.mypy]
python_version = "3.13"
strict = true
packages = ["llm_provider"]
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[dependency-groups]
dev = ["pytest>=8.3.3", "ruff>=0.7.4", "mypy>=1.13.0"]
